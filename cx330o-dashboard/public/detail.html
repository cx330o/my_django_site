      { title: 'AI 翻译', desc: 'LLM 辅助翻译，保持上下文一致性' },
      { title: '热更新', desc: '翻译文件变更无需重启，实时生效' },
    ],
    quickstart: `<span class="comment"># 安装 i18n 依赖</span>\n<span class="cmd">npm install i18next react-i18next i18next-http-backend</span>\n\n<span class="comment"># 初始化</span>\nimport i18n from 'i18next';\nimport { initReactI18next } from 'react-i18next';\ni18n.use(initReactI18next).init({ lng: 'en', fallbackLng: 'en' });`,
    arch: `cx330o-i18n/\n├── locales/       → 语言包 (en/zh/ja/es/ar/...)\n├── currencies/    → 货币格式配置\n└── sdk/           → React/Next.js 集成包`,
  },
};

function render(svc) {
  const s = services[svc];
  if (!s) {
    document.getElementById('pageTitle').textContent = '未知服务';
    document.getElementById('content').innerHTML = '<div class="cx-embed-error"><h2>未找到该服务</h2><a href="/">返回首页</a></div>';
    return;
  }

  document.title = s.title + ' — cx330o';
  document.getElementById('pageTitle').textContent = s.title;

  let actionsHtml = '';
  if (s.actions && s.actions.length) {
    actionsHtml = '<div class="cx-actions">' + s.actions.map((a, i) => {
      if (a.type === 'copy') {
        return `<button class="cx-action-btn" onclick="copyCmd(this, '${a.value.replace(/'/g, "\\'")}')">📋 ${a.label}</button>`;
      }
      return `<a class="cx-action-btn cx-action-link" href="${a.value}" target="_blank">🔗 ${a.label}</a>`;
    }).join('') + '</div>';
  }

  let html = `
    <div class="cx-hero">
      <span class="cx-hero-icon">${s.icon}</span>
      <div>
        <h1>${s.title}</h1>
        <span class="cx-tag">${s.tag}</span>
      </div>
    </div>
    ${actionsHtml}
    <div class="cx-desc">${s.desc}</div>
    <div class="cx-section">
      <h2>核心功能</h2>
      <div class="cx-feature-grid">
        ${s.features.map(f => `<div class="cx-feature-item"><h4>${f.title}</h4><p>${f.desc}</p></div>`).join('')}
      </div>
    </div>
  `;

  if (s.engines) {
    html += `
    <div class="cx-section">
      <h2>支持的引擎</h2>
      <table class="cx-table">
        <tr><th>引擎</th><th>数据类型</th><th>说明</th></tr>
        ${s.engines.map(e => `<tr><td style="color:var(--cx-brand-purple-light);font-family:var(--cx-font-mono);">${e[0]}</td><td>${e[1]}</td><td>${e[2]}</td></tr>`).join('')}
      </table>
    </div>`;
  }

  html += `
    <div class="cx-section">
      <h2>快速开始</h2>
      <div class="cx-code-block">${s.quickstart}</div>
    </div>
    <div class="cx-section">
      <h2>源码结构</h2>
      <div class="cx-arch-box">${s.arch}</div>
    </div>
  `;

  document.getElementById('content').innerHTML = html;
}

const params = new URLSearchParams(window.location.search);
render(params.get('svc'));

function copyCmd(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✅ 已复制';
    btn.style.borderColor = 'var(--cx-status-ok)';
    btn.style.color = 'var(--cx-status-ok)';
    setTimeout(() => {
      btn.textContent = orig;
      btn.style.borderColor = '';
      btn.style.color = '';
    }, 2000);
  });
}

</script>
</body>
</html>
